name: Merge back
run-name: Merge back main into develop

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  call-merge-back-workflow:
    #uses: syrocolab/workflows/.github/workflows/merge-back.yml@main
    uses: ./.github/workflows/shared-workflows-merge-back.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      source-branch: main
      target-branch: develop
    secrets:
      token: ${{ secrets.RELEASE_PLEASE_GITHUB_TOKEN }}
