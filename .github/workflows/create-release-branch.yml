name: Create release branch

on:
  workflow_dispatch:
    inputs:
      source-branch:
        description: Branch to create release from
        required: true
        default: develop
      release-branch:
        description: Release branch name
        required: true
        default: release

permissions:
  contents: write

jobs:
  recreate-release-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source-branch }}
          fetch-depth: 0

      - name: Recreate release branch from source branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          RELEASE_BRANCH="${{ inputs.release-branch }}"
          SOURCE_BRANCH="${{ inputs.source-branch }}"

          # Delete remote branch if it already exists
          git push origin --delete "$RELEASE_BRANCH" || true

          # Recreate local branch from source branch
          git checkout -B "$RELEASE_BRANCH" "origin/$SOURCE_BRANCH"

          # Force-push the branch
          git push --force --set-upstream origin "$RELEASE_BRANCH"
