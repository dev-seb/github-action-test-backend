name: Deploy Production

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-docker-image:
    name: Build and publish Docker image
    if: github.event.release.prerelease == false && github.event.release.draft == false
    runs-on: ubuntu-latest
    concurrency: production_environment
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set IMAGE_TAG env variable
        run: echo "IMAGE_TAG=$(git describe --tags)" >> $GITHUB_ENV

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        run: |
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
    outputs:
      docker-image-tag: "${{ steps.build-image.outputs.image_tag }}"

  create-infra-pr:
    name: Create infra release PR
    needs: build-docker-image
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build-docker-image.outputs.docker-image-tag }}
      INFRA_REPO: dev-seb/github-action-test-infra

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v5
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.RELEASE_PLEASE_GITHUB_TOKEN }}
          path: infra

      - name: Update nodejs-api version
        run: |
          cd infra
          sed -i "s|\(application_repository_url.*:\)[^\"]*|\1$VERSION|g" ./live/demo-syroco/nodejs-api/terragrunt.hcl
          sed -i "s|\(application_repository_url.*:\)[^\"]*|\1$VERSION|g" ./live/production-cma/nodejs-api/terragrunt.hcl
          sed -i "s|\(application_repository_url.*:\)[^\"]*|\1$VERSION|g" ./live/production-syroco/nodejs-api/terragrunt.hcl

      - name: Commit changes and open PR
        id: new-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="feature/deploy-nodejs-api-${VERSION}"

          cd infra

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout develop
          git checkout -b $BRANCH_NAME
          git add .
          git commit -am "chore(deploy): nodejs API $VERSION"
          git push origin $BRANCH_NAME

          new_pr_url=$(gh pr create \
            --title "chore(deploy): nodejs API $VERSION" \
            --body "Created by GitHub action" \
            --base develop \
            --head $BRANCH_NAME)

          echo "pr_url=$new_pr_url" >> $GITHUB_OUTPUT

      - name: Notify Slack
        uses: slackapi/slack-github-action@v3
        continue-on-error: true
        env:
          PR_URL: ${{ steps.new-pr.outputs.pr_url }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Infra PR is ready:\n<${{ env.PR_URL }}|chore(deploy): nodejs API ${{ env.VERSION }}>"
                  },
                }
              ]
            }

  deploy-production-syroco:
    runs-on: ubuntu-latest
    if: ${{ github.event.release.target_commitish == 'main' && github.event.release.prerelease == false }}
    name: Deploy Webapp on production Syroco
    steps:
      - name: Simulate deployment
        run: |
          echo "Starting fake deployment..."
          sleep 20   # wait 20 seconds
          echo "Fake deployment completed!"

  slack-notification:
    runs-on: ubuntu-latest
    needs: deploy-production-syroco
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v3
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":rocket: *NodeJS API ${{ github.ref_name }} successfully deployed to production*"
                  },
                }
              ]
            }
