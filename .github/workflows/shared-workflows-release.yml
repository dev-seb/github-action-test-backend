name: Shared workflows - Release

on:
  workflow_call:
    secrets:
      token:
        description: "Token"
        required: true
      slack-webhook-url:
        description: "Slack Webhook URL"
        required: false
    inputs:
      target-branch:
        description: "Target branch"
        required: true
        type: string

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      body: ${{ steps.release.outputs.body }}
      tag: ${{ steps.extract.outputs.tag }}
      url: ${{ steps.extract.outputs.url }}
      has_slack_webhook_url: ${{ secrets.slack-webhook-url != '' }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.token }}
          target-branch: ${{ inputs.target-branch }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          pull-request-header: "chore(release)"

      - name: Extract Release Metadata
        id: extract
        shell: bash
        env:
          RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          PR_JSON: ${{ steps.release.outputs.pr }}
          REL_TAG: ${{ steps.release.outputs.tag_name }}
          REL_URL: ${{ steps.release.outputs.html_url }}
          REPO: ${{ github.repository }}
        run: |
          if [[ "$RELEASE_CREATED" == "true" ]]; then
            echo "url=$REL_URL" >> $GITHUB_OUTPUT
            echo "tag=$REL_TAG" >> $GITHUB_OUTPUT
          elif [[ -n "$PR_JSON" && "$PR_JSON" != "{}" ]]; then
            # Extract the PR Number and Title
            PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
            PR_TITLE=$(echo "$PR_JSON" | jq -r '.title')
            
            # Construct the URL manually since html_url is missing from the output
            CONSTRUCTED_URL="https://github.com/$REPO/pull/$PR_NUMBER"
            
            # Extract version from title (e.g., "1.181.3")
            PROPOSED_TAG=$(echo "$PR_TITLE" | sed 's/.*release //')
            
            echo "url=$CONSTRUCTED_URL" >> $GITHUB_OUTPUT
            echo "tag=$PROPOSED_TAG" >> $GITHUB_OUTPUT
          fi

  call-merge-back-workflow:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    #uses: ./.github/workflows/merge-back.yml@main
    uses: ./.github/workflows/shared-workflows-merge-back.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      source-branch: main
      target-branch: develop
    secrets:
      token: ${{ secrets.token }}
      slack-webhook-url: ${{ secrets.slack-webhook-url }}

  slack-notification-pr:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created != 'true' && needs.release-please.outputs.has_slack_webhook_url == 'true'
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v3
        continue-on-error: true
        env:
          PR_URL: ${{ needs.release-please.outputs.url}}
          VERSION: ${{ needs.release-please.outputs.tag }}
        with:
          webhook: ${{ secrets.slack-webhook-url }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "NodeJS API ${{ env.VERSION }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Release PR is ready:\n<${{ env.PR_URL }}|chore(release): NodeJS API ${{ env.VERSION }}>"
                  },
                },
              ]
            }

  slack-notification-release:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.has_slack_webhook_url == 'true'
    steps:
      - name: Format Release Body for Slack
        id: slack_format
        shell: bash
        env:
          # Get the raw body (prioritizing release, then PR)
          RAW_BODY: ${{ needs.release-please.outputs.body }}
        run: |
          echo "$RAW_BODY"

          # 1. Apply formatting using a simple pipe chain
          # - Remove the version header line
          # - Convert ### to * (Bold)
          # - Convert * bullets to • (Slack Bullets)
          # - Remove commit links
          CLEAN=$(echo "$RAW_BODY" | \
            sed -E '/^## \[.*\]/d' | \
            sed -E 's/^###+ (.*)/*\1*/g' | \
            sed -E 's/^\* /\n•  /g' | \
            sed -E 's/ \(\[[0-9a-f]+\]\(https?:\/\/[^)]+\)\)//g')

          # 2. Use a Multiline Output (No escaping needed here!)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CLEAN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Notify Slack
        uses: slackapi/slack-github-action@v3
        continue-on-error: true
        env:
          RELEASE_URL: ${{ needs.release-please.outputs.url }}
          VERSION: ${{ needs.release-please.outputs.tag }}
          CHANGELOG: ${{ steps.slack_format.outputs.changelog }}
        with:
          webhook: ${{ secrets.slack-webhook-url }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Release and tag created!\n\n:package: Backend <${{ env.RELEASE_URL }}|${{ env.VERSION }}>\n${{ env.CHANGELOG}}"
                  },
                },
              ]
            }
