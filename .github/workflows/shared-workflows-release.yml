name: Shared workflows - Release

on:
  workflow_call:
    secrets:
      token:
        description: "Token"
        required: true
    inputs:
      target-branch:
        description: "Target branch"
        required: true
        type: string
    outputs:
      release_created:
        description: "Whether a release PR was created"
        value: ${{ jobs.release-please.outputs.release_created }}
      body:
        description: "Created PR body with changelog"
        value: ${{ jobs.release-please.outputs.body }}
      tag:
        description: "Created tag name"
        value: ${{ jobs.release-please.outputs.tag }}
      url:
        description: "Created PR URL"
        value: ${{ jobs.release-please.outputs.url }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      body: ${{ steps.release.outputs.body }}
      tag: ${{ steps.extract.outputs.tag }}
      url: ${{ steps.extract.outputs.url }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.token }}
          target-branch: ${{ inputs.target-branch }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Extract Release Metadata
        id: extract
        shell: bash
        run: |
          # 1. Determine the URL (Prioritize Release URL, fallback to PR URL)
          if [[ "${{ steps.release.outputs.release_created }}" == "true" ]]; then
            echo "url=${{ steps.release.outputs.html_url }}" >> $GITHUB_OUTPUT
            echo "tag=${{ steps.release.outputs.tag_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.release.outputs.pr }}" != "" ]]; then
            PR_URL=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.html_url')
            PR_TITLE=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.title')
            # Extract 'v1.2.3' from 'chore(main): release v1.2.3'
            PROPOSED_TAG=$(echo "$PR_TITLE" | sed 's/.*release //')
            
            echo "url=$PR_URL" >> $GITHUB_OUTPUT
            echo "tag=$PROPOSED_TAG" >> $GITHUB_OUTPUT
          fi
