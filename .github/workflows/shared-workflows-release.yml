name: Shared workflows - Release

on:
  workflow_call:
    secrets:
      token:
        description: "Token"
        required: true
    inputs:
      target-branch:
        description: "Target branch"
        required: true
        type: string
    outputs:
      release_created:
        description: "Whether a release PR was created"
        value: ${{ jobs.release-please.outputs.release_created }}
      body:
        description: "Created PR body with changelog"
        value: ${{ jobs.release-please.outputs.body }}
      tag:
        description: "Created tag name"
        value: ${{ jobs.release-please.outputs.tag }}
      url:
        description: "Created PR URL"
        value: ${{ jobs.release-please.outputs.url }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      body: ${{ steps.release.outputs.body }}
      tag: ${{ steps.extract.outputs.tag }}
      url: ${{ steps.extract.outputs.url }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.token }}
          target-branch: ${{ inputs.target-branch }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Extract Release Metadata
        id: extract
        shell: bash
        env:
          # Pass outputs as env vars to avoid shell syntax errors
          RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          PR_JSON: ${{ steps.release.outputs.pr }}
          REL_TAG: ${{ steps.release.outputs.tag_name }}
          REL_URL: ${{ steps.release.outputs.html_url }}
        run: |
          if [[ "$RELEASE_CREATED" == "true" ]]; then
            echo "url=$REL_URL" >> $GITHUB_OUTPUT
            echo "tag=$REL_TAG" >> $GITHUB_OUTPUT
          elif [[ -n "$PR_JSON" && "$PR_JSON" != "{}" ]]; then
            # Use jq to safely parse the env var
            PR_URL=$(echo "$PR_JSON" | jq -r '.html_url // ""')
            PR_TITLE=$(echo "$PR_JSON" | jq -r '.title // ""')
            
            # Extract version from title (e.g., "1.181.3")
            PROPOSED_TAG=$(echo "$PR_TITLE" | sed 's/.*release //')
            
            echo "url=$PR_URL" >> $GITHUB_OUTPUT
            echo "tag=$PROPOSED_TAG" >> $GITHUB_OUTPUT
          fi
