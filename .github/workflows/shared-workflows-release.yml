name: Shared workflows - Release

on:
  workflow_call:
    secrets:
      token:
        description: "Token"
        required: true
    inputs:
      target-branch:
        description: "Target branch"
        required: true
        type: string
      release-type:
        description: "Release type"
        required: false
        # Default to node for Node.js projects, can be overridden for other types
        type: string
        default: node

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.token }}
          release-type: ${{ inputs.release-type }}
          target-branch: ${{ inputs.target-branch }}

      # This step only runs if a Release was actually created (PR was merged)
      - name: Checkout
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Create PR to main
        if: ${{ steps.release.outputs.release_created }}
        run: gh pr create -B main --title 'chore(release)':' ${{steps.release.outputs.tag_name}}' --body 'Created by Github action'
        env:
          GITHUB_TOKEN: ${{ secrets.token }}
