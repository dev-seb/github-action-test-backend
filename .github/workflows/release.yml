name: Release
run-name: ${{ startsWith(github.event.head_commit.message, 'chore(release') && 'Create release PR' || 'Prepare release changelog and version bump' }}

on:
  push:
    branches:
      - release

permissions:
  contents: write
  pull-requests: write

jobs:
  call-release-workflow:
    #uses: syrocolab/workflows/.github/workflows/release.yml@main
    uses: ./.github/workflows/shared-workflows-release.yml
    with:
      target-branch: ${{ github.ref_name }}
    secrets:
      token: ${{ secrets.RELEASE_PLEASE_GITHUB_TOKEN }}
