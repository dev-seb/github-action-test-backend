name: Release
run-name: >-
  ${{ 
    contains(github.event.head_commit.message, 'chore(main): release') 
    && 'Create tag and release' 
    || 'Create changelog and version bump PR' 
  }}

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  call-release-workflow:
    #uses: syrocolab/workflows/.github/workflows/release.yml@main
    uses: ./.github/workflows/shared-workflows-release.yml
    with:
      target-branch: ${{ github.ref_name }}
    secrets:
      token: ${{ secrets.RELEASE_PLEASE_GITHUB_TOKEN }}

  call-merge-back-workflow:
    needs: call-release-workflow
    if: needs.call-release-workflow.outputs.release_created == 'true'
    #uses: syrocolab/workflows/.github/workflows/merge-back.yml@main
    uses: ./.github/workflows/shared-workflows-merge-back.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      source-branch: main
      target-branch: develop
    secrets:
      token: ${{ secrets.RELEASE_PLEASE_GITHUB_TOKEN }}

  slack-notification-pr:
    runs-on: ubuntu-latest
    needs: call-release-workflow
    if: needs.call-release-workflow.outputs.release_created != 'true'
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v3
        continue-on-error: true
        env:
          PR_URL: ${{ needs.call-release-workflow.outputs.url}}
          VERSION: ${{ needs.call-release-workflow.outputs.tag }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "NodeJS API ${{ env.VERSION }} (release)"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Release PR is ready:\n<${{ env.PR_URL }}|chore(release): nodejs API ${{ env.VERSION }}>"
                  },
                },
              ]
            }

  slack-notification-release:
    runs-on: ubuntu-latest
    needs: call-release-workflow
    if: needs.call-release-workflow.outputs.release_created == 'true'
    steps:
      - name: Format Release Body for Slack
        id: slack_format
        shell: bash
        env:
          RAW_BODY: ${{ needs.call-release-workflow.outputs.release_body }}
        run: |
          # 1. Start with the raw content
          CLEAN_BODY="$RAW_BODY"

          # 2. DELETE the version header line (## [1.x.x](link) (date))
          # The '/pattern/d' command in sed deletes the entire matching line
          CLEAN_BODY=$(echo "$CLEAN_BODY" | sed -E '/^## \[.*\]/d')

          # 3. Convert leading "*" or "-" bullets to Slack's bullet character "•"
          # This ensures Slack treats it as a visual list
          CLEAN_BODY=$(echo "$CLEAN_BODY" | sed -E 's/^[[:space:]]*[\*\-] /• /g')

          # 4. Convert GFM Bold (**text**) to Slack Bold (*text*)
          CLEAN_BODY=$(echo "$CLEAN_BODY" | sed -E 's/\*\*([^*]+)\*\//*\1*/g')

          # 5. Remove commit links: " ([hash](url))" 
          CLEAN_BODY=$(echo "$CLEAN_BODY" | sed -E 's/ \(\[[0-9a-f]+\]\(https?:\/\/[^)]+\)\)//g')

          # 6. Escape double quotes for JSON compatibility
          CLEAN_BODY=$(echo "$CLEAN_BODY" | sed 's/"/\\"/g')

          # 7. Remove any leading/trailing empty lines left over from the header removal
          CLEAN_BODY=$(echo "$CLEAN_BODY" | sed '/./,$!d')

          # 8. Output using a Heredoc
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CLEAN_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Notify Slack
        uses: slackapi/slack-github-action@v3
        continue-on-error: true
        env:
          PR_URL: ${{ needs.call-release-workflow.outputs.url }}
          VERSION: ${{ needs.call-release-workflow.outputs.tag }}
          CHANGELOG: ${{ steps.slack_format.outputs.changelog }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":package: Backend <${{ env.PR_URL }}|${{ env.VERSION }}>\n${{ env.CHANGELOG}}"
                  },
                },
              ]
            }
